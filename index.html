<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

a{
text-decoration:none;
color:inherit;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:
radial-gradient(circle at 20% 20%, #ffd27a 0%, transparent 40%),
radial-gradient(circle at 80% 30%, #ff9f43 0%, transparent 45%),
radial-gradient(circle at 30% 80%, #ffb347 0%, transparent 40%),
radial-gradient(circle at 70% 70%, #ffa500 0%, transparent 40%),
linear-gradient(135deg,#ffb347,#ff7e00);
}

h1{
color:white;
font-size:50px;
margin-bottom:50px;
text-shadow:0 4px 10px rgba(0,0,0,.3);
}

.menu{
display:grid;
grid-template-columns:repeat(2,200px);
gap:30px;
}

.card{
height:150px;
border-radius:24px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:600;
color:white;
transition:.25s;
}

.card:hover{
transform:scale(1.12);
box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

</style>
</head>

<body>

<h1>🍊 Tangerine++</h1>

<div class="menu">

<a class="card" href="games.html">🎮 Games</a>
<a class="card" href="arcade.html">🕹️ Arcade</a>

</div>

</body>
</html>
